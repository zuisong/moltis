name: Provider Integration Tests

on:
  schedule:
    # Daily at 06:00 UTC (after the main CI cron at 04:00)
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: provider-integration
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  provider-tests:
    name: ${{ matrix.provider }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Don't fail the whole workflow if one provider is down
    continue-on-error: true
    strategy:
      fail-fast: false
      # Run providers sequentially to avoid rate limits across suites
      max-parallel: 1
      matrix:
        include:
          - provider: minimax
            test: minimax_integration
          - provider: moonshot
            test: moonshot_integration
          - provider: fireworks
            test: fireworks_integration
          - provider: anthropic
            test: anthropic_integration
          - provider: openai
            test: openai_integration
          - provider: mistral
            test: mistral_integration
          - provider: openrouter
            test: openrouter_integration
          - provider: kimi-code
            test: kimi_code_integration
          - provider: deepseek
            test: deepseek_integration
          - provider: gemini
            test: gemini_integration
          - provider: zai
            test: zai_integration
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Configure provider secret (minimax)
        if: matrix.provider == 'minimax'
        env:
          PROVIDER_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::warning::Secret not configured — skipping tests"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "MINIMAX_API_KEY=$PROVIDER_API_KEY" >> "$GITHUB_ENV"

      - name: Configure provider secret (moonshot)
        if: matrix.provider == 'moonshot'
        env:
          PROVIDER_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        run: |
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::warning::Secret not configured — skipping tests"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "MOONSHOT_API_KEY=$PROVIDER_API_KEY" >> "$GITHUB_ENV"

      - name: Configure provider secret (fireworks)
        if: matrix.provider == 'fireworks'
        env:
          PROVIDER_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        run: |
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::warning::Secret not configured — skipping tests"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "FIREWORKS_API_KEY=$PROVIDER_API_KEY" >> "$GITHUB_ENV"

      - name: Configure provider secret (anthropic)
        if: matrix.provider == 'anthropic'
        env:
          PROVIDER_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::warning::Secret not configured — skipping tests"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "ANTHROPIC_API_KEY=$PROVIDER_API_KEY" >> "$GITHUB_ENV"

      - name: Configure provider secret (openai)
        if: matrix.provider == 'openai'
        env:
          PROVIDER_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::warning::Secret not configured — skipping tests"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "OPENAI_API_KEY=$PROVIDER_API_KEY" >> "$GITHUB_ENV"

      - name: Configure provider secret (mistral)
        if: matrix.provider == 'mistral'
        env:
          PROVIDER_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::warning::Secret not configured — skipping tests"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "MISTRAL_API_KEY=$PROVIDER_API_KEY" >> "$GITHUB_ENV"

      - name: Configure provider secret (openrouter)
        if: matrix.provider == 'openrouter'
        env:
          PROVIDER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::warning::Secret not configured — skipping tests"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "OPENROUTER_API_KEY=$PROVIDER_API_KEY" >> "$GITHUB_ENV"

      - name: Configure provider secret (kimi-code)
        if: matrix.provider == 'kimi-code'
        env:
          PROVIDER_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: |
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::warning::Secret not configured — skipping tests"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "KIMI_API_KEY=$PROVIDER_API_KEY" >> "$GITHUB_ENV"

      - name: Configure provider secret (deepseek)
        if: matrix.provider == 'deepseek'
        env:
          PROVIDER_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::warning::Secret not configured — skipping tests"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "DEEPSEEK_API_KEY=$PROVIDER_API_KEY" >> "$GITHUB_ENV"

      - name: Configure provider secret (gemini)
        if: matrix.provider == 'gemini'
        env:
          PROVIDER_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::warning::Secret not configured — skipping tests"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "GEMINI_API_KEY=$PROVIDER_API_KEY" >> "$GITHUB_ENV"

      - name: Configure provider secret (zai)
        if: matrix.provider == 'zai'
        env:
          PROVIDER_API_KEY: ${{ secrets.Z_API_KEY }}
        run: |
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::warning::Secret not configured — skipping tests"
            echo "SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "Z_API_KEY=$PROVIDER_API_KEY" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        if: env.SKIP != 'true'
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        if: env.SKIP != 'true'
        with:
          shared-key: provider-integration-v1
          cache-all-crates: true

      - name: Install build dependencies
        if: env.SKIP != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential clang libclang-dev pkg-config

      - name: Run integration tests
        if: env.SKIP != 'true'
        env:
          TEST_NAME: ${{ matrix.test }}
        run: |
          cargo test \
            --test "$TEST_NAME" \
            -- --ignored \
            --test-threads=1

  summary:
    name: Integration Summary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: provider-tests
    if: always()
    steps:
      - name: Report
        run: echo "Provider integration tests completed. Check individual job results above."
