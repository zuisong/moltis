name: Provider Integration Tests

on:
  schedule:
    # Daily at 06:00 UTC (after the main CI cron at 04:00)
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: provider-integration
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  provider-tests:
    name: ${{ matrix.provider }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Don't fail the whole workflow if one provider is down
    continue-on-error: true
    strategy:
      fail-fast: false
      # Run providers sequentially to avoid rate limits across suites
      max-parallel: 1
      matrix:
        include:
          - provider: minimax
            test: minimax_integration
            secret_key: MINIMAX_API_KEY
          - provider: moonshot
            test: moonshot_integration
            secret_key: MOONSHOT_API_KEY
          - provider: fireworks
            test: fireworks_integration
            secret_key: FIREWORKS_API_KEY
          - provider: anthropic
            test: anthropic_integration
            secret_key: ANTHROPIC_API_KEY
          - provider: openai
            test: openai_integration
            secret_key: OPENAI_API_KEY
          - provider: mistral
            test: mistral_integration
            secret_key: MISTRAL_API_KEY
          - provider: openrouter
            test: openrouter_integration
            secret_key: OPENROUTER_API_KEY
          - provider: kimi-code
            test: kimi_code_integration
            secret_key: KIMI_API_KEY
          - provider: deepseek
            test: deepseek_integration
            secret_key: DEEPSEEK_API_KEY
          - provider: gemini
            test: gemini_integration
            secret_key: GEMINI_API_KEY
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Check secret is configured
        env:
          HAS_SECRET: ${{ secrets[matrix.secret_key] != '' }}
        run: |
          if [ "$HAS_SECRET" != "true" ]; then
            echo "::warning::Secret not configured — skipping tests"
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        if: env.SKIP != 'true'
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        if: env.SKIP != 'true'
        with:
          shared-key: provider-integration-v1
          cache-all-crates: true

      - name: Install build dependencies
        if: env.SKIP != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential clang libclang-dev pkg-config

      - name: Run integration tests
        if: env.SKIP != 'true'
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TEST_NAME: ${{ matrix.test }}
        run: |
          cargo test \
            --test "$TEST_NAME" \
            -- --ignored \
            --test-threads=1

  summary:
    name: Integration Summary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: provider-tests
    if: always()
    steps:
      - name: Report
        run: echo "Provider integration tests completed. Check individual job results above."
